appId: com.vikingdb.desktop
productName: OwlContext
directories:
  output: dist
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!**/.swc/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  # Package all backend resources as-is
  - from: resources/backend/
    to: backend/
    filter:
      - '**/*'
  # Optional Python helpers; comment these back in after they are built
  # - from: externals/python/window_inspector/dist/window_inspector/window_inspector
  #   to: bin/window_inspector
  # - from: externals/python/window_capture/dist/window_capture/window_capture
  #   to: bin/window_capture
asarUnpack:
  - resources/**
win:
  executableName: OwlContext
  icon: build/icon.png
  sign: false
  verifyUpdateCodeSignature: false
  # Windows file version (will be auto-converted from 0.1.2 to 0.1.2.0)
  # If rcedit still fails, try running as administrator or closing file explorer
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
# Note: Disabling ASAR would change app structure, so we keep it enabled
# The integrity check modification step may fail if OwlContext.exe is locked
# Make sure to run clean-build.bat before building
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
